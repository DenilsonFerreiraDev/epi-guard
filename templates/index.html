<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPI GUARD - Sistema de Controle</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --fundo-dark: #121214; --card-dark: #1c1c1f;
            --azul-logo: #0a2647; --laranja-logo: #f28c28;
            --texto-claro: #e1e1e6; --texto-muted: #a8a8b3; --borda: #29292e;
            --ia-azul: #3b82f6;
        }
        body { font-family: 'Inter', sans-serif; background: var(--fundo-dark); color: var(--texto-claro); margin: 0; }
        header { background: var(--card-dark); text-align: center; padding: 30px 0; border-bottom: 3px solid var(--laranja-logo); }
        .logo-img { max-width: 280px; filter: drop-shadow(0 0 10px rgba(242, 140, 40, 0.2)); }
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .menu-tabs { display: flex; gap: 12px; margin-bottom: 30px; }
        .tab-btn { flex: 1; padding: 15px; border: 2px solid var(--borda); border-radius: 8px; cursor: pointer; background: var(--card-dark); color: var(--texto-muted); font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: var(--azul-logo); color: #fff; border-color: var(--laranja-logo); }
        .card { background: var(--card-dark); padding: 30px; border-radius: 12px; border: 1px solid var(--borda); display: none; }
        .card.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
        .form-grupo { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--laranja-logo); font-weight: 600; }
        input { width: 100%; padding: 14px; border-radius: 6px; border: 1px solid var(--borda); background: var(--fundo-dark); color: #fff; box-sizing: border-box; }
        .btn-salvar { width: 100%; background: var(--laranja-logo); color: #fff; padding: 16px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-ia { background: var(--ia-azul); margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        th { text-align: left; color: var(--laranja-logo); border-bottom: 1px solid var(--borda); padding: 15px; }
        td { padding: 15px; border-bottom: 1px solid var(--borda); }
        .estoque-baixo { color: #ff5555; font-weight: bold; }
        .grid-kpi { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .kpi-card { background: var(--fundo-dark); padding: 20px; border-radius: 10px; border-left: 5px solid var(--laranja-logo); }
    </style>
</head>
<body>

<header><img src="/static/EPIGUARD.png" alt="EPI GUARD" class="logo-img"></header>

<div class="container">
    <div class="menu-tabs">
        <button class="tab-btn active" onclick="mudarAba('tab-entregas', this)">Entregas</button>
        <button class="tab-btn" onclick="mudarAba('tab-funcionarios', this)">Funcionários</button>
        <button class="tab-btn" onclick="mudarAba('tab-estoque', this)">Estoque</button>
        <button class="tab-btn" onclick="mudarAba('tab-dashboard', this)">Dashboard</button>
    </div>

    <div id="tab-entregas" class="card active">
        <h2>📝 Registrar Entrega</h2>
        <div class="form-grupo"><label>ID Funcionário:</label><input type="number" id="ent_func_id"></div>
        <div class="form-grupo"><label>Nome do EPI:</label><input type="text" id="ent_epi_nome"></div>
        <div class="form-grupo"><label>Número CA:</label><input type="text" id="ent_ca_num"></div>
        <button class="btn-salvar" onclick="registrarEntrega()">Salvar Entrega</button>
        <table><thead><tr><th>Trabalhador</th><th>EPI</th><th>C.A.</th></tr></thead><tbody id="lista-entregas"></tbody></table>
    </div>

    <div id="tab-funcionarios" class="card">
        <h2>👷 Novo Cadastro</h2>
        <div class="form-grupo"><label>Nome:</label><input type="text" id="func_nome"></div>
        <div class="form-grupo"><label>Cargo:</label><input type="text" id="func_cargo"></div>
        <div class="form-grupo"><label>CPF:</label><input type="text" id="func_cpf"></div>
        <button class="btn-salvar" onclick="cadastrarFuncionario()">Finalizar Cadastro</button>
    </div>

    <div id="tab-estoque" class="card">
        <h2>📦 Estoque</h2>
        <div class="form-grupo"><label>EPI:</label><input type="text" id="epi_nome_cad"></div>
        <div class="form-grupo"><label>C.A.:</label><input type="text" id="epi_ca_cad"></div>
        <div class="form-grupo"><label>Qtd:</label><input type="number" id="epi_qtd_cad"></div>
        <button class="btn-salvar" onclick="cadastrarEPI()">Cadastrar</button>
        <table><thead><tr><th>EPI</th><th>C.A.</th><th>Qtd</th><th>Ação</th></tr></thead><tbody id="lista-estoque"></tbody></table>
    </div>

    <div id="tab-dashboard" class="card">
        <h2 style="color: var(--laranja-logo);">📊 Dashboard Inteligente</h2>

        <button class="btn-salvar btn-ia" onclick="pedirConselhoIA()">
            ✨ Consultar Inteligência Artificial
        </button>

        <div class="grid-kpi">
            <div class="kpi-card" style="border-color: #ff5555;">
                <small>ESTOQUE CRÍTICO</small>
                <h3 id="kpi-critico" style="font-size: 32px; margin: 5px 0;">0</h3>
            </div>
            <div class="kpi-card">
                <small>ENTREGAS HOJE</small>
                <h3 id="kpi-hoje" style="font-size: 32px; margin: 5px 0;">0</h3>
            </div>
        </div>
        <canvas id="graficoEPIs"></canvas>
    </div>
</div>

<script>
    let meuGrafico = null;

    function mudarAba(idAba, btn) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(idAba).classList.add('active');
        btn.classList.add('active');
        if(idAba === 'tab-entregas') carregarRelatorio();
        if(idAba === 'tab-estoque') carregarEstoque();
        if(idAba === 'tab-dashboard') carregarDashboard();
    }

    async function pedirConselhoIA() {
        Swal.fire({
            title: 'Consultando o Gemini...',
            text: 'Analisando dados de estoque para recomendações.',
            allowOutsideClick: false,
            didOpen: () => { Swal.showLoading() }
        });

        try {
            const res = await fetch('/analise-ia');
            const dados = await res.json();
            Swal.fire({
                title: 'Conselho da IA',
                text: dados.analise,
                icon: 'info',
                confirmButtonColor: '#3b82f6'
            });
        } catch (e) {
            Swal.fire('Erro', 'Não foi possível falar com a IA.', 'error');
        }
    }

    async function carregarDashboard() {
        const res = await fetch('/dashboard-stats');
        const dados = await res.json();

        document.getElementById('kpi-critico').innerText = dados.estoque_critico ?? 0;
        document.getElementById('kpi-hoje').innerText = dados.entregas_hoje ?? 0;

        if (dados.top_epis && dados.top_epis.length > 0) {
            const ctx = document.getElementById('graficoEPIs').getContext('2d');
            if (meuGrafico) meuGrafico.destroy();
            meuGrafico = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: dados.top_epis.map(i => i.epi_nome),
                    datasets: [{ label: 'Retiradas', data: dados.top_epis.map(i => i.total), backgroundColor: '#f28c28' }]
                },
                options: { scales: { y: { beginAtZero: true } } }
            });
        }
    }

    async function carregarRelatorio() {
        const res = await fetch('/relatorio-entregas');
        const dados = await res.json();
        document.getElementById('lista-entregas').innerHTML = dados.map(i => `<tr><td>${i.funcionario}</td><td>${i.equipamento}</td><td>${i.ca}</td></tr>`).join('');
    }

    async function carregarEstoque() {
        const res = await fetch('/epis');
        const dados = await res.json();
        document.getElementById('lista-estoque').innerHTML = dados.map(i => `<tr><td>${i.nome_epi}</td><td>${i.ca_numero}</td><td class="${i.quantidade < 5 ? 'estoque-baixo' : ''}">${i.quantidade}</td><td><button onclick="reporEstoque(${i.id},'${i.nome_epi}','${i.ca_numero}')">🔄</button></td></tr>`).join('');
    }

    async function registrarEntrega() {
        const body = { funcionario_id: parseInt(document.getElementById('ent_func_id').value), epi_nome: document.getElementById('ent_epi_nome').value, ca_numero: document.getElementById('ent_ca_num').value };
        const res = await fetch('/entregas', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)});
        const data = await res.json();
        Swal.fire(res.ok ? 'Sucesso' : 'Erro', data.mensagem || data.erro, res.ok ? 'success' : 'error');
        carregarRelatorio();
    }

    async function cadastrarFuncionario() {
        const body = { nome: document.getElementById('func_nome').value, cargo: document.getElementById('func_cargo').value, cpf: document.getElementById('func_cpf').value };
        const res = await fetch('/usuarios', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)});
        if(res.ok) Swal.fire('Cadastrado!', '', 'success');
    }

    async function cadastrarEPI() {
        const body = { nome_epi: document.getElementById('epi_nome_cad').value, ca_numero: document.getElementById('epi_ca_cad').value, quantidade: parseInt(document.getElementById('epi_qtd_cad').value) };
        const res = await fetch('/epis', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)});
        if(res.ok) { Swal.fire('Adicionado!', '', 'success'); carregarEstoque(); }
    }

    async function reporEstoque(id, nome, ca) {
        const { value: q } = await Swal.fire({ title: `Repor ${nome}`, input: 'number', confirmButtonColor: '#f28c28' });
        if (q) {
            await fetch(`/epis/${id}`, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({nome_epi: nome, ca_numero: ca, quantidade: parseInt(q)})});
            carregarEstoque();
        }
    }

    window.onload = carregarRelatorio;
</script>
</body>
</html>
